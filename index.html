<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Risk Simulator | Tradeable vs Lossable</title>
    <style>
        :root {
            --bg-dark: #06090f;
            --card-bg: #111827;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-orange: #f59e0b;
            --text-main: #f3f4f6;
            --text-dim: #9ca3af;
            --border: #1f2937;
        }

        * { box-sizing: border-box; font-family: 'Inter', -apple-system, sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        .container { width: 100%; max-width: 1100px; display: grid; grid-template-columns: 350px 1fr; gap: 24px; flex: 1; }

        /* Sidebar Inputs */
        .panel { background: var(--card-bg); border: 1px solid var(--border); padding: 24px; border-radius: 16px; height: fit-content; }
        .panel h2 { margin-top: 0; font-size: 1.1rem; color: var(--accent-blue); text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.75rem; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; font-weight: 600; }
        .input-group input, .input-group select {
            width: 100%; background: #0b0f1a; border: 1px solid var(--border); border-radius: 8px;
            padding: 12px; color: white; font-size: 0.95rem; transition: all 0.2s;
        }
        .input-group input:focus { border-color: var(--accent-blue); outline: none; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }

        /* Toggle Switch Styling */
        .toggle-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #0b0f1a;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 15px;
            transition: opacity 0.3s;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-blue); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* Dashboard */
        .dashboard { display: flex; flex-direction: column; gap: 20px; }
        
        .status-card {
            padding: 35px; border-radius: 16px; text-align: center;
            transition: all 0.3s ease; border: 1px solid var(--border);
            background: linear-gradient(145deg, #111827, #0b0f1a);
        }
        .safe { border-left: 5px solid var(--accent-green); }
        .danger { border-left: 5px solid var(--accent-red); }
        .warning { border-left: 5px solid var(--accent-orange); }

        .status-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; }
        .status-desc { font-size: 1rem; color: var(--text-dim); }

        .metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .metric-box {
            background: var(--card-bg); border: 1px solid var(--border); padding: 20px; border-radius: 12px;
        }
        .metric-label { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; font-weight: 600; }
        .metric-value { font-size: 1.4rem; font-weight: 700; margin-top: 8px; font-family: 'JetBrains Mono', monospace; }

        /* Price Slider */
        .slider-wrap { margin: 25px 0; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent-blue); height: 6px; border-radius: 3px; }

        .gauge-wrap { height: 6px; background: #1f2937; border-radius: 3px; margin-top: 12px; overflow: hidden; }
        #margin-gauge-fill { height: 100%; width: 0%; transition: width 0.4s ease; }

        .reason-box {
            margin-top: 20px; padding: 20px; border-radius: 12px; font-size: 0.95rem;
            line-height: 1.6; border: 1px solid var(--border); background: rgba(255,255,255,0.02);
        }

        footer {
            margin-top: 50px; padding: 25px; color: var(--text-dim); font-size: 0.85rem;
            text-align: center; width: 100%; border-top: 1px solid var(--border);
            letter-spacing: 0.5px;
        }

        @media (max-width: 850px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <aside class="panel">
        <h2>Parameters</h2>
        
        <div class="input-group">
            <label>Direction</label>
            <select id="direction">
                <option value="buy">Long (BUY)</option>
                <option value="sell">Short (SELL)</option>
            </select>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="input-group">
                <label>Entry Price</label>
                <input type="number" id="entryPrice" value="5000" step="0.01">
            </div>
            <div class="input-group">
                <label>Predicted Price</label>
                <input type="number" id="predictedPrice" value="5500" step="0.01">
            </div>
        </div>

        <div class="slider-wrap">
            <label style="font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase;">Simulated Price</label>
            <input type="range" id="priceSlider" min="2500" max="7500" step="1">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="input-group">
                <label>Lot Size</label>
                <input type="number" id="lotSize" value="1.0" step="0.1">
            </div>
            <div class="input-group">
                <label>Leverage</label>
                <input type="text" id="leverage" value="1:100">
            </div>
        </div>

        <div class="input-group">
            <label>Account Balance ($)</label>
            <input type="number" id="balance" value="1000">
        </div>

        <div class="input-group">
            <label>Bonus System</label>
            <select id="bonusType">
                <option value="tradeable">Tradeable Bonus</option>
                <option value="lossable">Lossable Bonus</option>
            </select>
        </div>

        <!-- TOGGLE BUTTON -->
        <div id="toggleContainer" class="toggle-group">
            <label style="font-size: 0.75rem; color: var(--text-dim); font-weight: 600;">IGNORE BONUS IN EQUITY</label>
            <label class="switch">
                <input type="checkbox" id="ignoreBonusToggle">
                <span class="slider"></span>
            </label>
        </div>

        <div class="input-group">
            <label>Bonus Amount ($)</label>
            <input type="number" id="bonusAmount" value="500">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="input-group">
                <label>Stop-Out (%)</label>
                <input type="number" id="stopOutLevel" value="50">
            </div>
            <div class="input-group">
                <label>Contract</label>
                <input type="number" id="contractSize" value="1000">
            </div>
        </div>
    </aside>

    <main class="dashboard">
        <div id="statusCard" class="status-card safe">
            <div id="statusTitle" class="status-title">Trade Active</div>
            <div id="statusDesc" class="status-desc">Calculating simulation...</div>
        </div>

        <div id="metricsArea">
            <div class="metrics-grid">
                <div class="metric-box">
                    <div class="metric-label">Projected Equity</div>
                    <div id="outEquity" class="metric-value">$0.00</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">Margin Level</div>
                    <div id="outMarginLevel" class="metric-value">0%</div>
                    <div class="gauge-wrap"><div id="margin-gauge-fill"></div></div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">Used Margin</div>
                    <div id="outMargin" class="metric-value">$0.00</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">Distance to S/O</div>
                    <div id="outDistance" class="metric-value">0.00</div>
                </div>
            </div>

            <div class="panel" style="margin-top: 20px;">
                <div class="metrics-grid">
                    <div>
                        <div class="metric-label">Stop-Out Price</div>
                        <div id="outStopPrice" class="metric-value" style="color: var(--accent-red);">0.00</div>
                    </div>
                    <div>
                        <div class="metric-label">Floating P/L</div>
                        <div id="outPL" class="metric-value">$0.00</div>
                    </div>
                </div>
                <div id="reasonText" class="reason-box"></div>
            </div>
        </div>
    </main>
</div>

<footer>
    copyright Amaanullah Bhatti - Junior Risk Analyst
</footer>

<script>
    const inputs = ['entryPrice', 'predictedPrice', 'direction', 'lotSize', 'balance', 'leverage', 'bonusType', 'bonusAmount', 'stopOutLevel', 'contractSize', 'ignoreBonusToggle'];
    const dom = {};
    inputs.forEach(id => dom[id] = document.getElementById(id));
    const slider = document.getElementById('priceSlider');

    function parseLeverage(val) { return parseFloat(val.toString().replace('1:', '')) || 1; }

    function update() {
        const entry = parseFloat(dom.entryPrice.value) || 0;
        const pred = parseFloat(dom.predictedPrice.value) || 0;
        const dir = dom.direction.value;
        const lot = parseFloat(dom.lotSize.value) || 0;
        const contract = parseFloat(dom.contractSize.value) || 0;
        const balance = parseFloat(dom.balance.value) || 0;
        const bonus = parseFloat(dom.bonusAmount.value) || 0;
        const leverage = parseLeverage(dom.leverage.value);
        const soPercent = parseFloat(dom.stopOutLevel.value) || 0;
        const type = dom.bonusType.value;
        const isIgnored = dom.ignoreBonusToggle.checked && type === 'tradeable';

        // UI Management for Toggle
        document.getElementById('toggleContainer').style.opacity = (type === 'tradeable') ? "1" : "0.3";
        document.getElementById('ignoreBonusToggle').disabled = (type !== 'tradeable');

        // Check Entry Ability
        const requiredMargin = (lot * contract * entry) / leverage;
        const totalCash = balance + bonus;

        const statusCard = document.getElementById('statusCard');
        if (requiredMargin > totalCash) {
            statusCard.className = 'status-card warning';
            document.getElementById('statusTitle').innerText = "Cannot Enter Position";
            document.getElementById('statusDesc').innerText = `Insufficient funds. Required: $${requiredMargin.toFixed(2)}, Available: $${totalCash.toFixed(2)}.`;
            document.getElementById('metricsArea').style.opacity = "0.2";
            return;
        } else {
            document.getElementById('metricsArea').style.opacity = "1";
        }

        // Logic
        if (document.activeElement !== slider) {
            slider.min = entry * 0.5; slider.max = entry * 1.5; slider.value = pred;
        }
        
        const floatingPL = (dir === 'buy' ? (pred - entry) : (entry - pred)) * lot * contract;
        
        // Structural Fix 1: Equity Calculation based on toggle
        const equity = isIgnored ? (balance + floatingPL) : (balance + bonus + floatingPL);
        const marginLevel = requiredMargin > 0 ? (equity / requiredMargin) * 100 : 0;

        // Calculate Stop-out Price
        const multiplier = dir === 'buy' ? 1 : -1;
        const targetEquitySO = requiredMargin * (soPercent / 100);
        
        // Threshold A: Margin Level SO
        // Equity = targetEquitySO => (BaseEquity + PL) = targetEquitySO
        const currentEquityBase = isIgnored ? balance : (balance + bonus);
        const plNeededSO = targetEquitySO - currentEquityBase;
        const priceSO = entry + (plNeededSO / (lot * contract * multiplier));

        // Threshold B: Zero Floor / Bonus Floor
        // If Ignored: Stop when balance + PL = 0 (Equity = 0)
        // If Default Tradeable: Stop when balance + bonus + PL = bonus (Equity = bonus)
        const floorEquity = isIgnored ? 0 : (type === 'tradeable' ? bonus : -Infinity);
        const plNeededFloor = floorEquity - currentEquityBase;
        const priceFloor = entry + (plNeededFloor / (lot * contract * multiplier));

        const stopPrice = dir === 'buy' ? Math.max(priceSO, priceFloor) : Math.min(priceSO, priceFloor);
        const isStopped = dir === 'buy' ? (pred <= stopPrice) : (pred >= stopPrice);

        // UI Update
        document.getElementById('outMargin').innerText = `$${requiredMargin.toLocaleString(undefined, {minimumFractionDigits:2})}`;
        document.getElementById('outEquity').innerText = `$${equity.toLocaleString(undefined, {minimumFractionDigits:2})}`;
        document.getElementById('outPL').innerText = `$${floatingPL.toLocaleString(undefined, {minimumFractionDigits:2})}`;
        document.getElementById('outMarginLevel').innerText = `${marginLevel.toFixed(2)}%`;
        document.getElementById('outStopPrice').innerText = stopPrice.toFixed(2);
        document.getElementById('outDistance').innerText = Math.abs(pred - stopPrice).toFixed(2);
        document.getElementById('sliderValDisplay').innerText = pred.toFixed(2);

        const gauge = document.getElementById('margin-gauge-fill');
        gauge.style.width = `${Math.min(marginLevel / 5, 100)}%`;
        gauge.style.backgroundColor = marginLevel <= soPercent ? 'var(--accent-red)' : 'var(--accent-blue)';

        if (isStopped) {
            statusCard.className = 'status-card danger';
            document.getElementById('statusTitle').innerText = "Trade WILL Hit Stop-Out";
            document.getElementById('statusDesc').innerText = `Liquidation triggered at price ${stopPrice.toFixed(2)}.`;
            
            const hitFloor = (dir === 'buy' && stopPrice === priceFloor) || (dir === 'sell' && stopPrice === priceFloor);
            document.getElementById('reasonText').innerHTML = hitFloor 
                ? `<strong>Liquidation Reason:</strong> Position closed because ${isIgnored ? 'Physical Balance' : 'Equity'} hit the ${isIgnored ? 'Zero' : 'Bonus'} floor ($${floorEquity.toFixed(2)}).`
                : `<strong>Liquidation Reason:</strong> Margin Level dropped to the ${soPercent}% Stop-Out limit.`;
        } else {
            statusCard.className = 'status-card safe';
            document.getElementById('statusTitle').innerText = "Trade Survives";
            document.getElementById('statusDesc').innerText = `Position remains active at ${pred.toFixed(2)}.`;
            document.getElementById('reasonText').innerText = `Equity stays above liquidation thresholds under current ${isIgnored ? 'strict risk' : 'default'} parameters.`;
        }
        document.getElementById('outPL').style.color = floatingPL >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';
    }

    inputs.forEach(id => dom[id].addEventListener('input', update));
    slider.addEventListener('input', (e) => { dom.predictedPrice.value = parseFloat(e.target.value).toFixed(2); update(); });
    update();
</script>
</body>
  </html>
